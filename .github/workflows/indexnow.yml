name: Submit IndexNow

# Runs after GitHub Pages deploy finishes so the IndexNow key file and
# changed URLs are live before we notify search engines.
on:
  workflow_run:
    workflows: ["Deploy GitHub Pages"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  submit:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Submit sitemap URLs to IndexNow
        continue-on-error: true
        run: python scripts/submit_indexnow.py --wait-for-live
